<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
    
    <script>
  if (window.location.pathname.endsWith('/index.html')) {
    const cleanUrl = window.location.pathname.replace('/index.html', '/');
    window.history.replaceState({}, '', cleanUrl);
  } else if (window.location.pathname.endsWith('.html')) {
    const cleanUrl = window.location.pathname.replace('.html', '');
    window.history.replaceState({}, '', cleanUrl);
  }
</script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vault | Stream Unlimited</title>
  <style>
    @import url('https://fonts.cdnfonts.com/css/gotham');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #F0ECE4;
      --accent-dim: #C4BAAA;
    }

    body {
      font-family: 'Gotham', 'Century Gothic', sans-serif;
      font-weight: 400;
      background: #0A0A0A;
      color: #E8E8E8;
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .landing-backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center;
      filter: blur(20px) brightness(0.3);
      transform: scale(1.1);
    }

    .landing-gradient {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(10,10,10,0.4) 0%,
        rgba(10,10,10,0.7) 50%,
        rgba(10,10,10,0.95) 100%
      );
    }

    .landing-container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .landing-logo {
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeSlideUp 1s 0.2s ease forwards;
    }

    .landing-logo img {
      height: 80px;
      width: auto;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4));
    }

    .landing-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 16px;
      letter-spacing: -0.02em;
      opacity: 0;
      animation: fadeSlideUp 1s 0.4s ease forwards;
    }

    .landing-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: rgba(232,232,232,0.7);
      margin-bottom: 64px;
      font-weight: 400;
      max-width: 600px;
      line-height: 1.6;
      opacity: 0;
      animation: fadeSlideUp 1s 0.6s ease forwards;
    }

    .landing-search-wrapper {
      width: 100%;
      max-width: 700px;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeSlideUp 1s 0.8s ease forwards;
    }

    .landing-search {
      position: relative;
      width: 100%;
    }

    .landing-search input {
      width: 100%;
      padding: 24px 28px;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(240,236,228,0.15);
      border-radius: 16px;
      color: #E8E8E8;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: all 0.3s ease;
      font-family: 'Gotham', 'Century Gothic', sans-serif;
      font-weight: 400;
    }

    .landing-search input::placeholder {
      color: rgba(232,232,232,0.4);
    }

    .landing-search input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255,255,255,0.12);
      box-shadow: 0 8px 32px rgba(240,236,228,0.1);
    }

    .landing-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeSlideUp 1s 1s ease forwards;
    }

    .btn-enter {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 40px;
      background: var(--accent);
      color: #0A0A0A;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(240,236,228,0.2);
    }

    .btn-enter:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(240,236,228,0.3);
      background: #FFFFFF;
    }

    .btn-enter svg {
      width: 20px;
      height: 20px;
    }

    .landing-footer {
      position: fixed;
      bottom: 32px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.85rem;
      color: rgba(232,232,232,0.4);
      z-index: 3;
      opacity: 0;
      animation: fadeIn 1s 1.2s ease forwards;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 768px) {
      .landing-title {
        font-size: 2rem;
      }
      .landing-subtitle {
        font-size: 1rem;
        margin-bottom: 48px;
      }
      .landing-search input {
        padding: 20px 24px;
        font-size: 1rem;
      }
      .btn-enter {
        padding: 16px 32px;
      }
      .landing-logo img {
        height: 60px;
      }
    }
  </style>
</head>
<body>

<div class="landing-backdrop" id="landingBackdrop"></div>
<div class="landing-gradient"></div>

<div class="landing-container">
  <div class="landing-logo">
    <img src="vault/vault-logo.png" alt="Vault" />
  </div>

  <h1 class="landing-title">Your Personal Cinema</h1>
  <p class="landing-subtitle">
    Discover and stream unlimited movies, TV shows, and anime. 
    All in one place.
  </p>

  <div class="landing-search-wrapper">
    <div class="landing-search">
      <input 
        type="text" 
        id="landingSearchInput" 
        placeholder="Search your favourite tv shows and movies"
        autocomplete="off"
      />
    </div>
  </div>

  <div class="landing-actions">
    <a href="vault/index.html" class="btn-enter">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      Enter Vault
    </a>
  </div>
</div>

<div class="landing-footer">
  Press Enter to search or click above to explore
</div>

<script>
// TMDB Configuration
const TMDB_KEY = '4e44d9029b1270a757cddc766a1bcb63';
const TMDB_BASE = 'https://api.themoviedb.org/3';
const IMG_ORI = 'https://image.tmdb.org/t/p/original';

// Load Featured Movie Backdrop
async function loadBackdrop() {
  try {
    const response = await fetch(`${TMDB_BASE}/trending/movie/day?api_key=${TMDB_KEY}`);
    const data = await response.json();
    const movies = data.results || [];
    const featured = movies[Math.floor(Math.random() * Math.min(5, movies.length))];
    
    if (featured && featured.backdrop_path) {
      const backdrop = document.getElementById('landingBackdrop');
      backdrop.style.backgroundImage = `url(${IMG_ORI}${featured.backdrop_path})`;
    }
  } catch (e) {
    console.error('Failed to load backdrop', e);
  }
}

// Search Input Handler
const searchInput = document.getElementById('landingSearchInput');

searchInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && searchInput.value.trim()) {
    // Navigate to vault with search query
    const query = encodeURIComponent(searchInput.value.trim());
    window.location.href = `vault/index.html?search=${query}`;
  }
});

searchInput.addEventListener('focus', () => {
  searchInput.select();
});

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  loadBackdrop();
});
</script>

</body>
</html>
