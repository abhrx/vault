<script type="module">
import React, { useState, useEffect, useCallback } from 'react';
import { createRoot } from 'react-dom/client';
import * as DropdownMenu from '@radix-ui/react-dropdown-menu';

const e = React.createElement;

const SOURCES = [
  { id: 'vidlink',    label: 'VidLink' },
  { id: 'vidrock',    label: 'VidRock' },
  { id: '111movies',  label: '111Movies' },
  { id: 'vidzee',     label: 'VidZee' },
  { id: 'vidsrc',     label: 'VidSrc 1' },
  { id: 'vidsrc2',    label: 'VidSrc 2' },
  { id: 'vidsrc3',    label: 'VidSrc 3' },
  { id: 'videasy',    label: 'Videasy' },
  { id: 'vidnest',    label: 'VidNest' },
  { id: 'rivestream', label: 'RiveStream' },
  { id: 'vidsrcxyz',  label: 'VidSrc XYZ' },
  { id: 'vidsrcicu',  label: 'VidSrc ICU' },
];

function ChevronIcon() {
  return e('svg', {
    className: 'source-chevron',
    width: 12, height: 12,
    viewBox: '0 0 12 12',
    fill: 'none',
    stroke: 'currentColor',
    strokeWidth: 1.8,
    strokeLinecap: 'round',
    strokeLinejoin: 'round'
  }, e('polyline', { points: '2 4 6 8 10 4' }));
}

function CheckIcon() {
  return e('svg', {
    width: 12, height: 12,
    viewBox: '0 0 12 12',
    fill: 'none',
    stroke: 'currentColor',
    strokeWidth: 2,
    strokeLinecap: 'round',
    strokeLinejoin: 'round'
  }, e('polyline', { points: '2 6 5 9 10 3' }));
}

function SourceDropdown() {
  const [selected, setSelected] = useState('vidlink');

  useEffect(() => {
    const handler = (ev) => setSelected(ev.detail || 'vidlink');
    window.addEventListener('playerSourceChanged', handler);
    return () => window.removeEventListener('playerSourceChanged', handler);
  }, []);

  const handleSelect = useCallback((srcId) => {
    setSelected(srcId);
    if (window.setPlayerSource) window.setPlayerSource(srcId);
  }, []);

  const current = SOURCES.find(s => s.id === selected) || SOURCES[0];

  return e(DropdownMenu.Root, null,
    e(DropdownMenu.Trigger, { className: 'source-dropdown-trigger', asChild: false },
      e('span', { className: 'source-dropdown-label' }, current.label),
      e(ChevronIcon)
    ),
    e(DropdownMenu.Portal, null,
      e(DropdownMenu.Content, {
        className: 'source-dropdown-content',
        sideOffset: 8,
        align: 'start',
        avoidCollisions: true
      },
        ...SOURCES.map(src =>
          e(DropdownMenu.Item, {
            key: src.id,
            className: 'source-dropdown-item' + (src.id === selected ? ' selected' : ''),
            onSelect: () => handleSelect(src.id)
          },
            e('span', { className: 'source-item-label' }, src.label),
            src.id === selected ? e(CheckIcon) : null
          )
        )
      )
    )
  );
}

const container = document.getElementById('sourceDropdownRoot');
if (container) {
  const root = createRoot(container);
  root.render(e(SourceDropdown));
}
</script>

<script>
  function histFilterSort(raw, sortKey, typeFilter) {
    let list = Array.isArray(raw) ? [...raw] : [];
    if (typeFilter === 'movie') list = list.filter(x => (x.media_type || x.mediaType || 'movie') === 'movie');
    if (typeFilter === 'tv') list = list.filter(x => (x.media_type || x.mediaType || 'movie') === 'tv');
    const rating = x => Number(x.vote_average || 0);
    const title = x => (x.title || x.name || '').toLowerCase();
    const watched = x => Number(x.watchedAt || 0);
    if (sortKey === 'watched-desc') list.sort((a, b) => watched(b) - watched(a));
    else if (sortKey === 'watched-asc') list.sort((a, b) => watched(a) - watched(b));
    else if (sortKey === 'rating-desc') list.sort((a, b) => rating(b) - rating(a));
    else if (sortKey === 'rating-asc') list.sort((a, b) => rating(a) - rating(b));
    else if (sortKey === 'title-asc') list.sort((a, b) => title(a).localeCompare(title(b)));
    else if (sortKey === 'type') list.sort((a, b) => (a.media_type || '').localeCompare(b.media_type || '') || title(a).localeCompare(title(b)));
    return list;
  }

  function renderHistory() {
    const grid = document.getElementById('historyGrid');
    if (!grid) return;
    const sortKey = document.getElementById('histSort')?.value || 'watched-desc';
    const typeFilter = document.getElementById('histType')?.value || 'all';
    const history = histFilterSort(JSON.parse(localStorage.getItem('history') || '[]'), sortKey, typeFilter);
    grid.innerHTML = '';
    if (history.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <i data-lucide="history" style="width:48px;height:48px;opacity:0.2;"></i>
          <h3>No history yet</h3>
          <p>Titles you watch will appear here, or adjust filters.</p>
        </div>`;
      lucide.createIcons();
      return;
    }
    history.forEach(item => grid.appendChild(buildCard(item)));
    lucide.createIcons();
  }

  document.addEventListener('DOMContentLoaded', () => {
    const grid = document.getElementById('historyGrid');
    document.getElementById('clearHistoryBtn')?.addEventListener('click', () => {
      if (confirm('Clear all watch history?')) {
        localStorage.removeItem('history');
        renderHistory();
      }
    });
    document.getElementById('histSort')?.addEventListener('change', renderHistory);
    document.getElementById('histType')?.addEventListener('change', renderHistory);
    document.getElementById('histExportBtn')?.addEventListener('click', () => {
      const blob = new Blob([exportVaultDataJSON()], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'vault-library-backup.json';
      a.click();
      URL.revokeObjectURL(a.href);
    });
    document.getElementById('histImportBtn')?.addEventListener('click', () => document.getElementById('histImportFile')?.click());
    document.getElementById('histImportFile')?.addEventListener('change', async e => {
      const f = e.target.files?.[0];
      e.target.value = '';
      if (!f) return;
      try {
        await triggerVaultImportFile(f, 'merge');
        renderHistory();
      } catch (err) {
        alert('Import failed: ' + (err.message || err));
      }
    });
    renderHistory();
  });
  window.addEventListener('vault:dataUpdated', () => renderHistory());
</script>
